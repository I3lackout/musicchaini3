<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="MusicChain i3  Open Source">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="55%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="50%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>
  <rect x="0" y="316" width="1280" height="4" fill="url(#accent)" opacity="0.6"/>
  <!-- chain nodes -->
  <g fill="none" stroke="#ff6d00" stroke-width="2" opacity="0.35">
    <circle cx="180" cy="160" r="28"/>
    <circle cx="280" cy="120" r="18"/>
    <circle cx="280" cy="200" r="18"/>
    <circle cx="1000" cy="160" r="28"/>
    <circle cx="900" cy="120" r="18"/>
    <circle cx="900" cy="200" r="18"/>
    <line x1="208" y1="160" x2="262" y2="128"/>
    <line x1="208" y1="160" x2="262" y2="192"/>
    <line x1="972" y1="160" x2="918" y2="128"/>
    <line x1="972" y1="160" x2="918" y2="192"/>
  </g>
  <!-- note -->
  <g filter="url(#glow)" transform="translate(640 160)">
    <ellipse cx="0" cy="8" rx="52" ry="36" fill="#ff6d00" opacity="0.15"/>
    <path d="M-18 -40 L-18 28 L28 8 L28 -40 Z" fill="#ff6d00" opacity="0.9"/>
    <rect x="-22" y="-48" width="48" height="12" rx="4" fill="#ffb347"/>
  </g>
  <text x="640" y="108" text-anchor="middle" font-family="system-ui,Segoe UI,Roboto,sans-serif" font-size="52" font-weight="700" fill="#ffffff">MusicChain i3</text>
  <text x="640" y="155" text-anchor="middle" font-family="system-ui,Segoe UI,Roboto,sans-serif" font-size="22" font-weight="500" fill="#ffb347" letter-spacing="0.12em">OPEN SOURCE · MUSIC ECOSYSTEM</text>
  <text x="640" y="248" text-anchor="middle" font-family="system-ui,Segoe UI,Roboto,sans-serif" font-size="17" fill="rgba(255,255,255,0.72)">Streaming · Creator rewards · Transparent economics · Track blockchain</text>
  <text x="640" y="278" text-anchor="middle" font-family="system-ui,Segoe UI,Roboto,sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">musicchaini3.com</text>
</svg>
